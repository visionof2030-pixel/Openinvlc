<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📺 IPTV Player - قنوات بي إن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
        }
        .container {
            background: #111;
            padding: 30px 25px;
            border-radius: 24px;
            max-width: 480px;
            width: 100%;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 60px rgba(255, 136, 0, 0.08);
            text-align: center;
        }
        .header {
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }
        .header .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 5px;
        }
        .header h1 {
            color: #00ff88;
            font-size: 24px;
            font-weight: 700;
        }
        .header .badge {
            display: inline-block;
            background: #ff3333;
            color: #fff;
            font-size: 10px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: 5px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .header p {
            color: #666;
            font-size: 13px;
            margin-top: 6px;
        }
        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .channel-item {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 12px 16px;
            border: 1px solid #2a2a2a;
            transition: all 0.3s;
        }
        .channel-item:active {
            transform: scale(0.97);
            border-color: #00ff88;
        }
        .channel-name {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-align: right;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .channel-name .flag {
            font-size: 20px;
        }
        .channel-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-small {
            flex: 1;
            min-width: 80px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .btn-small:active {
            transform: scale(0.95);
        }
        .btn-vlc-small {
            background: linear-gradient(145deg, #ff8800, #e67600);
        }
        .btn-mx-small {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
        }
        .btn-ios-small {
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
        }
        .btn-small .emoji {
            font-size: 14px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 8px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222;
        }
        .divider span {
            color: #444;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer {
            text-align: center;
            color: #333;
            font-size: 10px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1a1a1a;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
        .toast.show {
            opacity: 1;
        }
        .note {
            color: #555;
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            line-height: 1.8;
        }
        .note strong {
            color: #00ff88;
        }
        .platform-badge {
            display: inline-block;
            font-size: 8px;
            background: #222;
            padding: 2px 8px;
            border-radius: 8px;
            color: #666;
            margin-left: 4px;
        }
        @media (max-width: 400px) {
            .channel-name {
                font-size: 14px;
            }
            .btn-small {
                font-size: 10px;
                padding: 6px 8px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span class="icon">📡</span>
            <h1>قنوات بي إن</h1>
            <span class="badge">● LIVE</span>
            <p id="subText">اختر القناة ثم التطبيق المناسب</p>
        </div>

        <div class="channel-list" id="channelList">
            <!-- سيتم إنشاء القنوات بواسطة JavaScript -->
        </div>

        <div class="divider"><span>📌 ملاحظة</span></div>

        <p style="color:#666;font-size:12px;margin:5px 0;">
            🔹 اختر القناة ثم التطبيق المناسب لجهازك<br>
            🔹 تأكد من تثبيت التطبيق أولاً
        </p>

        <p class="note" id="deviceNote">
            💡 اختر التطبيق المناسب لجهازك
        </p>
        <div class="footer">⚡ IPTV | يعمل على iPhone و Android</div>
    </div>

    <div id="toast" class="toast">✅ جاري الفتح...</div>

    <script>
        // ===== قائمة القنوات =====
        const channels = [
            {
                name: "Bein 1 HD",
                flag: "⚽",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/460862.ts"
            },
            {
                name: "Bein 2 HD",
                flag: "⚽",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/460865.ts"
            },
            {
                name: "Bein 3 HD",
                flag: "⚽",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/460868.ts"
            },
            {
                name: "Bein 4 HD",
                flag: "⚽",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/460871.ts"
            },
            {
                name: "ALWAN 1 4K",
                flag: "📺",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/418111.ts"
            },
            {
                name: "Alwan 2 4K",
                flag: "📺",
                url: "http://akar13.xyz:8080/live/15034094901029/18800196589372/418114.ts"
            }
        ];

        // ===== كشف نوع الجهاز =====
        function getDeviceType() {
            const ua = navigator.userAgent.toLowerCase();
            if (/iphone|ipad|ipod/.test(ua)) return 'ios';
            if (/android/.test(ua)) return 'android';
            return 'other';
        }

        const device = getDeviceType();

        // ===== إنشاء عناصر القنوات =====
        const channelList = document.getElementById('channelList');

        channels.forEach((channel, index) => {
            const channelDiv = document.createElement('div');
            channelDiv.className = 'channel-item';

            // اسم القناة
            const nameDiv = document.createElement('div');
            nameDiv.className = 'channel-name';
            nameDiv.innerHTML = `
                <span class="flag">${channel.flag}</span>
                <span>${channel.name}</span>
            `;

            // أزرار التشغيل
            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'channel-buttons';

            if (device === 'ios') {
                // زر VLC للآيفون
                const btnVLC = document.createElement('a');
                btnVLC.href = `vlc://${channel.url}`;
                btnVLC.className = 'btn-small btn-ios-small';
                btnVLC.innerHTML = `<span class="emoji">🎬</span> VLC <span class="platform-badge">🍏</span>`;
                buttonsDiv.appendChild(btnVLC);
            } else if (device === 'android') {
                // زر VLC للأندرويد
                const btnVLC = document.createElement('a');
                btnVLC.href = `intent://${channel.url.replace('http://', '')}#Intent;scheme=http;package=org.videolan.vlc;type=video/*;end`;
                btnVLC.className = 'btn-small btn-vlc-small';
                btnVLC.innerHTML = `<span class="emoji">🎬</span> VLC <span class="platform-badge">🤖</span>`;
                buttonsDiv.appendChild(btnVLC);

                // زر MX Player
                const btnMX = document.createElement('a');
                btnMX.href = `intent://${channel.url.replace('http://', '')}#Intent;scheme=http;package=com.mxtech.videoplayer.ad;type=video/*;end`;
                btnMX.className = 'btn-small btn-mx-small';
                btnMX.innerHTML = `<span class="emoji">▶️</span> MX <span class="platform-badge">🤖</span>`;
                buttonsDiv.appendChild(btnMX);
            } else {
                // للأجهزة الأخرى
                const btnVLC = document.createElement('a');
                btnVLC.href = channel.url;
                btnVLC.target = '_blank';
                btnVLC.className = 'btn-small btn-vlc-small';
                btnVLC.innerHTML = `<span class="emoji">🎬</span> فتح`;
                buttonsDiv.appendChild(btnVLC);
            }

            channelDiv.appendChild(nameDiv);
            channelDiv.appendChild(buttonsDiv);
            channelList.appendChild(channelDiv);
        });

        // ===== تحديث النص السفلي =====
        const note = document.getElementById('deviceNote');
        const subText = document.getElementById('subText');

        if (device === 'ios') {
            note.innerHTML = '🍏 <strong>iPhone/iPad:</strong> استخدم زر <strong>VLC</strong> لكل قناة';
            subText.textContent = 'اختر القناة واضغط على VLC';
        } else if (device === 'android') {
            note.innerHTML = '🤖 <strong>Android:</strong> استخدم <strong>VLC</strong> أو <strong>MX Player</strong>';
            subText.textContent = 'اختر القناة والتطبيق المناسب';
        } else {
            note.innerHTML = '💡 استخدم <strong>VLC</strong> أو <strong>MX Player</strong>';
            subText.textContent = 'اختر القناة للبدء';
        }

        console.log('📺 IPTV Player - قنوات بي إن');
        console.log(`📡 تم تحميل ${channels.length} قناة`);
        console.log('📱 يعمل على iPhone و Android');
    </script>

</body>
</html>
